function atualizarTurmas() {
    const mod = document.getElementById('modalidade').value;
    const sel = document.getElementById('turma');
    sel.innerHTML = "<option value=''>Selecione a turma...</option>";
    if (!mod || !dadosEscola[mod]) return;
    Object.keys(dadosEscola[mod]).forEach(t => sel.innerHTML += `<option value="${t}">${t}</option>`);
}

function carregar() {
    const mod = document.getElementById('modalidade').value;
    const tur = document.getElementById('turma').value;
    const bim = document.getElementById('bimestre').value;
    const resumo = document.getElementById('resumo');
    const tabela = document.getElementById('tabela');
    if (!mod || !tur) { resumo.innerHTML = 'Selecione a modalidade e a turma para visualizar o relatório.'; tabela.innerHTML = ''; return; }
    const alunos = dadosEscola[mod]?.[tur] || [];
    const componentesAtuais = componentesPorTurma[tur] || [];
    if (!componentesAtuais.length) { resumo.innerHTML = `Turma <strong>${tur}</strong> sem componentes configurados.`; tabela.innerHTML = ''; return; }
    fetchNotas(tur, bim, alunos, componentesAtuais, resumo, tabela);
}

async function fetchNotas(tur, bim, alunos, componentesAtuais, resumo, tabela) {
    let query = sb.from('notas_componentes').select('aluno, componente, nota, bimestre, turma').eq('turma', tur);
    if (bim) query = query.eq('bimestre', bim);
    const { data, error } = await query;
    if (error) { resumo.innerHTML = 'Erro ao carregar dados.'; tabela.innerHTML = ''; return; }
    const porAluno = {};
    (data || []).forEach(r => {
        if (!porAluno[r.aluno]) porAluno[r.aluno] = {};
        porAluno[r.aluno][r.componente] = Number(r.nota);
    });
    let html = '<tr><th>Aluno</th>';
    componentesAtuais.forEach(c => html += `<th class="nota">${c.replace('Aperfeiçoamento em ', '')}</th>`);
    html += '<th class="media">Média</th></tr>';
    let somaTurma = 0;
    let qtdAlunosComMedia = 0;
    alunos.forEach(aluno => {
        const notas = componentesAtuais.map(c => {
            const v = porAluno[aluno]?.[c];
            return Number.isFinite(v) ? v : null;
        });
        const validas = notas.filter(v => v !== null);
        const media = validas.length ? validas.reduce((a, b) => a + b, 0) / validas.length : null;
        if (media !== null) { somaTurma += media; qtdAlunosComMedia++; }
        html += `<tr><td class="aluno">${aluno}</td>`;
        notas.forEach(v => html += `<td class="nota">${v === null ? '<span class="vazio">-</span>' : `<span class="ok">${v.toFixed(1)}</span>`}</td>`);
        html += `<td class="media">${media === null ? '<span class="vazio">-</span>' : media.toFixed(1)}</td></tr>`;
    });
    tabela.innerHTML = html;
    const mediaTurma = qtdAlunosComMedia ? (somaTurma / qtdAlunosComMedia) : null;
    resumo.innerHTML = `Turma <strong>${tur}</strong> com <strong>${componentesAtuais.length}</strong> componente(s). Média geral dos alunos: <strong>${mediaTurma === null ? '--' : mediaTurma.toFixed(1)}</strong>.`;
}

function getTabelaDados() {
    const table = document.getElementById('tabela');
    return [...table.querySelectorAll('tr')].map(tr => [...tr.querySelectorAll('th,td')].map(td => td.innerText.trim()));
}

function gerarPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');
    const mod = document.getElementById('modalidade').value || '';
    const tur = document.getElementById('turma').value || '';
    const bim = document.getElementById('bimestre').value || 'Todos os bimestres';
    doc.setFontSize(14);
    doc.text('Relatório por Turma - EEMTI DRAGÃO DO MAR', 14, 15);
    doc.setFontSize(10);
    doc.text(`Modalidade: ${mod} | Turma: ${tur} | Bimestre: ${bim}`, 14, 22);
    const rows = getTabelaDados();
    doc.autoTable({
        head: [rows[0] || []],
        body: rows.slice(1),
        startY: 28,
        styles: { fontSize: 7, cellPadding: 2, overflow: 'linebreak' },
        headStyles: { fillColor: [0, 77, 64] },
        theme: 'grid',
        margin: { left: 10, right: 10 }
    });
    doc.save(`relatorio_${tur || 'turma'}.pdf`);
}

function gerarXLS() {
    const tabela = document.getElementById('tabela');
    const wb = XLSX.utils.table_to_book(tabela, { sheet: 'Relatorio' });
    XLSX.writeFile(wb, `relatorio_${document.getElementById('turma').value || 'turma'}.xlsx`);
}

function voltar() { window.location.href = 'painel.html'; }
</script>
</body>
</html>
