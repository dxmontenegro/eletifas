<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Senha - EEMTI Dragão do Mar</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --verde: #16a34a;
            --azul: #2563eb;
            --escuro: #0f172a;
            --bg: #f1f5f9;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #dbeafe 0, #f1f5f9 40%, #e5e7eb 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }

        .box {
            background: #ffffff;
            padding: 26px 22px 22px;
            border-radius: 18px;
            box-shadow: 0 14px 30px rgba(15, 23, 42, 0.18);
            width: 100%;
            max-width: 340px;
            text-align: center;
            border: 1px solid rgba(209, 213, 219, 0.9);
        }

        h2 {
            margin: 0 0 4px;
            color: #0f766e;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #4b5563;
            margin: 0 0 10px;
        }

        .info {
            font-size: 0.8rem;
            color: #6b7280;
            text-align: left;
            margin: 0 0 10px;
            line-height: 1.4;
        }

        .info strong {
            color: #111827;
        }

        input {
            width: 100%;
            padding: 11px;
            margin-top: 8px;
            border-radius: 999px;
            border: 1px solid #d1d5db;
            box-sizing: border-box;
            font-size: 0.9rem;
            background: #f9fafb;
            outline: none;
            transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
        }

        input::placeholder {
            color: #9ca3af;
        }

        input:focus {
            border-color: var(--azul);
            background: #ffffff;
            box-shadow:
              0 0 0 1px rgba(37, 99, 235, 0.4),
              0 0 0 6px rgba(191, 219, 254, 0.9);
        }

        button {
            width: 100%;
            padding: 11px;
            margin-top: 14px;
            border-radius: 999px;
            border: none;
            box-sizing: border-box;
            background: linear-gradient(135deg, var(--azul), var(--verde));
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: 0.18s;
            box-shadow: 0 14px 30px rgba(37, 99, 235, 0.55);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 40px rgba(37, 99, 235, 0.7);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 10px 24px rgba(37, 99, 235, 0.55);
        }

        .back {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #6b7280;
        }

        .back a {
            color: var(--azul);
            text-decoration: none;
            font-weight: 500;
        }

        .back a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Nova Senha</h2>
        <p class="subtitle">Digite sua nova senha abaixo:</p>

        <p class="info">
            Esta senha será utilizada para acessar <strong>tanto a plataforma de frequência</strong>
            quanto o sistema de <strong>reserva de recursos</strong> da escola.
        </p>

        <input type="password" id="n-senha" placeholder="Mínimo 6 caracteres">

        <button onclick="salvar()">
            🔐 ATUALIZAR SENHA
        </button>

        <p class="back">
            <a href="index.html">Voltar para o login</a>
        </p>
    </div>

    <script>
        const _supabase = supabase.createClient(
            "https://bdjqajzhlkdfagdfknmh.supabase.co",
            "sb_publishable_OzKhMbCCGNxDLcpmLb4SIg_2I-bKYf1"
        );

        async function salvar() {
            const s = document.getElementById('n-senha').value;
            if (s.length < 6) return alert("A senha deve ter 6 ou mais caracteres.");

            const { error } = await _supabase.auth.updateUser({ password: s });
            if (error) {
                alert("Erro ao atualizar: " + error.message);
            } else {
                alert("Senha alterada! Use essa nova senha para entrar nas plataformas de frequência e de reserva.");
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
